<!DOCTYPE html>
<html lang="sq">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Parlamenti i Agjentëve · Elbasan 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<style>
:root {
  --bg: #0c0f14;
  --surface: #141820;
  --surface2: #1c2230;
  --border: rgba(255,255,255,0.07);
  --text: #e8e6e0;
  --muted: rgba(232,230,224,0.45);
  --accent: #c9a84c;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: 'IBM Plex Sans', sans-serif; min-height: 100vh; overflow: hidden; }

.bg-grid {
  position: fixed; inset: 0; z-index: 0;
  background-image: linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
  background-size: 60px 60px;
  pointer-events: none;
}

.header {
  position: relative; z-index: 10;
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 32px;
  border-bottom: 1px solid var(--border);
  background: rgba(12,15,20,0.95);
  backdrop-filter: blur(10px);
}
.header-left { display: flex; align-items: center; gap: 14px; }
.logo-mark {
  width: 36px; height: 36px; border: 1px solid var(--accent);
  display: flex; align-items: center; justify-content: center;
  font-family: 'Playfair Display', serif; color: var(--accent); font-size: 18px;
}
.app-name { font-family: 'Playfair Display', serif; font-size: 18px; letter-spacing: 0.02em; }
.app-sub { font-size: 11px; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; margin-top: 2px; }
.header-center { font-size: 12px; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; }
.live-badge {
  display: flex; align-items: center; gap: 7px;
  padding: 5px 14px; border: 1px solid rgba(201,168,76,0.3);
  font-size: 11px; color: var(--accent); letter-spacing: 0.1em; text-transform: uppercase;
}
.live-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); animation: pulse 1.5s infinite; }

.main { position: relative; z-index: 5; display: flex; flex-direction: column; height: calc(100vh - 69px); }

.topic-bar {
  padding: 12px 32px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 16px;
}
.topic-label { font-size: 10px; color: var(--accent); letter-spacing: 0.12em; text-transform: uppercase; white-space: nowrap; }
.topic-text { font-family: 'Playfair Display', serif; font-size: 15px; color: var(--text); }
.topic-input {
  flex: 1; background: transparent; border: none; outline: none;
  font-family: 'Playfair Display', serif; font-size: 15px; color: var(--text);
}
.topic-input::placeholder { color: var(--muted); }
.start-btn {
  padding: 7px 20px; background: var(--accent); color: #0c0f14;
  border: none; cursor: pointer; font-size: 12px; font-weight: 500;
  letter-spacing: 0.08em; text-transform: uppercase; transition: opacity 0.2s;
  white-space: nowrap;
}
.start-btn:hover { opacity: 0.85; }
.start-btn:disabled { opacity: 0.4; cursor: not-allowed; }

.arena { display: flex; flex: 1; overflow: hidden; }

.agents-panel {
  width: 72%; padding: 24px 28px 16px;
  display: flex; flex-direction: column; gap: 16px;
  border-right: 1px solid var(--border);
}

.agents-row {
  display: grid; grid-template-columns: repeat(5, 1fr); gap: 14px;
}

.agent-card {
  background: var(--surface);
  border: 1px solid var(--border);
  padding: 16px 12px 12px;
  display: flex; flex-direction: column; align-items: center; gap: 8px;
  cursor: pointer; transition: all 0.3s; position: relative;
  transform-style: preserve-3d;
}
.agent-card:hover { transform: translateY(-3px); border-color: rgba(255,255,255,0.15); }
.agent-card.speaking {
  border-color: var(--agent-color);
  box-shadow: 0 0 20px -5px var(--agent-color);
  transform: translateY(-5px) scale(1.02);
}
.agent-card.speaking::before {
  content: ''; position: absolute; inset: -1px;
  border: 1px solid var(--agent-color);
  animation: borderPulse 1.5s infinite;
}

.avatar-3d {
  width: 70px; height: 70px; position: relative;
  transform-style: preserve-3d;
  transition: transform 0.6s;
}
.agent-card.speaking .avatar-3d { animation: headBob 2s ease-in-out infinite; }
.avatar-face {
  width: 70px; height: 70px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  position: relative; overflow: visible;
}
.avatar-svg { width: 70px; height: 70px; }

.agent-name { font-size: 12px; font-weight: 500; color: var(--text); text-align: center; }
.agent-role { font-size: 10px; color: var(--muted); text-align: center; letter-spacing: 0.05em; text-transform: uppercase; }
.speaking-indicator {
  display: none; align-items: center; gap: 3px;
  margin-top: 2px;
}
.agent-card.speaking .speaking-indicator { display: flex; }
.speaking-dot { width: 4px; height: 4px; border-radius: 50%; animation: soundwave 0.6s ease-in-out infinite; }
.speaking-dot:nth-child(2) { animation-delay: 0.15s; height: 8px; margin-top: -2px; }
.speaking-dot:nth-child(3) { animation-delay: 0.3s; }

.vote-bar-agent {
  width: 100%; height: 2px; background: rgba(255,255,255,0.05);
  margin-top: 4px; position: relative; overflow: hidden;
}
.vote-fill { height: 100%; width: 0%; transition: width 0.8s; }

.debate-stream {
  flex: 1; overflow-y: auto; padding: 0 4px;
  display: flex; flex-direction: column; gap: 0;
  scroll-behavior: smooth;
}
.debate-stream::-webkit-scrollbar { width: 2px; }
.debate-stream::-webkit-scrollbar-track { background: transparent; }
.debate-stream::-webkit-scrollbar-thumb { background: var(--border); }

.message {
  display: flex; gap: 12px; padding: 12px 0;
  border-bottom: 1px solid rgba(255,255,255,0.04);
  animation: fadeSlideIn 0.4s ease;
}
.msg-avatar-sm {
  width: 30px; height: 30px; border-radius: 50%; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; font-weight: 500; margin-top: 2px;
}
.msg-content {}
.msg-meta { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; }
.msg-name { font-size: 11px; font-weight: 500; }
.msg-role-tag { font-size: 9px; color: var(--muted); letter-spacing: 0.06em; text-transform: uppercase; }
.audience-tag { font-size: 9px; letter-spacing: 0.06em; text-transform: uppercase; padding: 1px 6px; background: rgba(201,168,76,0.15); color: var(--accent); }
.msg-text { font-size: 13px; line-height: 1.7; color: rgba(232,230,224,0.85); }
.msg-typing { font-size: 13px; color: var(--muted); font-style: italic; }

.sidebar {
  width: 28%; display: flex; flex-direction: column;
  overflow: hidden;
}

.qr-section {
  padding: 20px;
  border-bottom: 1px solid var(--border);
  display: flex; flex-direction: column; align-items: center; gap: 10px;
}
.qr-title { font-size: 10px; color: var(--accent); letter-spacing: 0.12em; text-transform: uppercase; text-align: center; }
.qr-box { width: 110px; height: 110px; background: white; display: flex; align-items: center; justify-content: center; }
.qr-box img { width: 100%; height: 100%; }
.qr-sub { font-size: 10px; color: var(--muted); text-align: center; line-height: 1.5; }

.audience-feed {
  flex: 1; overflow-y: auto; padding: 16px 20px;
}
.audience-feed-title { font-size: 10px; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 12px; }
.audience-msg {
  background: var(--surface2); padding: 10px 12px; margin-bottom: 8px;
  font-size: 12px; color: var(--text); line-height: 1.5;
  border-left: 2px solid var(--accent);
  animation: fadeSlideIn 0.4s ease;
}
.audience-msg-meta { font-size: 10px; color: var(--muted); margin-top: 4px; }

.votes-section {
  padding: 16px 20px;
  border-top: 1px solid var(--border);
}
.votes-title { font-size: 10px; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 10px; }
.vote-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
.vote-name { font-size: 11px; color: var(--text); width: 90px; flex-shrink: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.vote-track { flex: 1; height: 3px; background: rgba(255,255,255,0.07); }
.vote-fill-bar { height: 100%; transition: width 0.8s; }
.vote-count { font-size: 10px; color: var(--muted); width: 20px; text-align: right; }

.round-badge {
  position: fixed; top: 80px; left: 50%; transform: translateX(-50%);
  background: var(--surface); border: 1px solid var(--accent);
  padding: 8px 24px; font-size: 11px; color: var(--accent);
  letter-spacing: 0.12em; text-transform: uppercase;
  animation: fadeInOut 3s forwards;
  z-index: 100;
}

.next-btn {
  margin: 0 32px 12px;
  padding: 8px; background: transparent; border: 1px solid var(--border);
  color: var(--muted); font-size: 11px; cursor: pointer; letter-spacing: 0.08em;
  text-transform: uppercase; transition: all 0.2s; width: calc(72% - 64px);
}
.next-btn:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
.next-btn:disabled { opacity: 0.3; cursor: not-allowed; }

@keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.2} }
@keyframes borderPulse { 0%,100%{opacity:1}50%{opacity:0.4} }
@keyframes headBob { 0%,100%{transform:translateY(0) rotate(0deg)}25%{transform:translateY(-3px) rotate(-1deg)}75%{transform:translateY(-2px) rotate(1deg)} }
@keyframes soundwave { 0%,100%{transform:scaleY(1)}50%{transform:scaleY(2.5)} }
@keyframes fadeSlideIn { from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)} }
@keyframes fadeInOut { 0%{opacity:0;transform:translateX(-50%) translateY(-10px)}15%{opacity:1;transform:translateX(-50%) translateY(0)}75%{opacity:1}100%{opacity:0} }
</style>
</head>
<body>
<div class="bg-grid"></div>

<header class="header">
  <div class="header-left">
    <div class="logo-mark">P</div>
    <div>
      <div class="app-name">Parlamenti i Agjentëve</div>
      <div class="app-sub">Java e Demokracisë · Elbasan 2026</div>
    </div>
  </div>
  <div class="header-center" id="roundIndicator">Vendos temën dhe fillo debatin</div>
  <div class="live-badge"><span class="live-dot"></span>Live</div>
</header>

<div class="main">
  <div class="topic-bar">
    <span class="topic-label">Tema</span>
    <input class="topic-input" id="topicInput" placeholder="Shkruaj temën e debatit dhe shtyp Enter..." />
    <button class="start-btn" id="startBtn" onclick="startDebate()">Fillo Debatin</button>
  </div>

  <div class="arena">
    <div class="agents-panel">
      <div class="agents-row" id="agentsRow"></div>
      <div class="debate-stream" id="debateStream"></div>
      <button class="next-btn" id="nextBtn" onclick="nextRound()" disabled>Rundi tjetër →</button>
    </div>

    <div class="sidebar">
      <div class="qr-section">
        <div class="qr-title">Audienca — skanoni për të pyetur</div>
        <div class="qr-box"><img id="qrImg" src="" alt="QR Code" /></div>
        <div class="qr-sub" id="qrUrl">Duke ngarkuar...</div>
      </div>
      <div class="audience-feed">
        <div class="audience-feed-title">Pyetje nga audienca</div>
        <div id="audienceMessages"></div>
      </div>
      <div class="votes-section">
        <div class="votes-title">Votat e audiencës</div>
        <div id="votesDisplay"></div>
      </div>
    </div>
  </div>
</div>

<script>
const socket = io();
let agents = [];
let currentTokens = {};

function makeSVGAvatar(type, color, bg) {
  const isFemale = type.startsWith('female');
  const idx = parseInt(type.split('_')[1]) || 1;
  const hairColors = ['#2c1810','#1a1a2e','#4a3728','#8b6914','#c0392b'];
  const skinTones = ['#f4c49a','#e8a87c','#d4956a','#c07850','#a0644a'];
  const hair = hairColors[(idx * 2) % hairColors.length];
  const skin = skinTones[idx % skinTones.length];

  if (isFemale) {
    return `<svg viewBox="0 0 70 70" xmlns="http://www.w3.org/2000/svg">
      <circle cx="35" cy="35" r="34" fill="${bg}" stroke="${color}" stroke-width="1.5"/>
      <ellipse cx="35" cy="46" rx="18" ry="14" fill="${skin}"/>
      <circle cx="35" cy="30" r="14" fill="${skin}"/>
      <path d="M21 28 Q22 16 35 16 Q48 16 49 28 Q45 18 35 18 Q25 18 21 28Z" fill="${hair}"/>
      ${idx===1 ? `<path d="M21 28 Q18 38 20 48 Q22 38 22 30Z" fill="${hair}"/>
      <path d="M49 28 Q52 38 50 48 Q48 38 48 30Z" fill="${hair}"/>` : ''}
      ${idx===2 ? `<path d="M21 28 Q17 22 20 18 Q25 12 35 13 Q45 12 50 18 Q53 22 49 28" fill="${hair}"/>` : ''}
      <circle cx="29" cy="30" r="2" fill="#2c1810"/>
      <circle cx="41" cy="30" r="2" fill="#2c1810"/>
      <circle cx="29.5" cy="29.5" r="0.7" fill="white"/>
      <circle cx="41.5" cy="29.5" r="0.7" fill="white"/>
      <path d="M31 35 Q35 38 39 35" stroke="#c07850" stroke-width="1.2" fill="none" stroke-linecap="round"/>
      <path d="M26 27 Q29 25 32 27" stroke="#2c1810" stroke-width="1" fill="none"/>
      <path d="M38 27 Q41 25 44 27" stroke="#2c1810" stroke-width="1" fill="none"/>
    </svg>`;
  } else {
    return `<svg viewBox="0 0 70 70" xmlns="http://www.w3.org/2000/svg">
      <circle cx="35" cy="35" r="34" fill="${bg}" stroke="${color}" stroke-width="1.5"/>
      <ellipse cx="35" cy="47" rx="19" ry="13" fill="${skin}"/>
      <circle cx="35" cy="30" r="14" fill="${skin}"/>
      <path d="M21 26 Q22 13 35 13 Q48 13 49 26 Q46 15 35 15 Q24 15 21 26Z" fill="${hair}"/>
      ${idx===2 ? `<path d="M21 26 Q19 20 22 16 Q26 11 35 12 Q44 11 48 16 Q51 20 49 26 Q46 14 35 14 Q24 14 21 26Z" fill="${hair}"/>` : ''}
      <circle cx="29" cy="30" r="2.2" fill="#1a1a1a"/>
      <circle cx="41" cy="30" r="2.2" fill="#1a1a1a"/>
      <circle cx="29.6" cy="29.4" r="0.8" fill="white"/>
      <circle cx="41.6" cy="29.4" r="0.8" fill="white"/>
      <path d="M31 36 Q35 39 39 36" stroke="#a0644a" stroke-width="1.3" fill="none" stroke-linecap="round"/>
      <path d="M26 27 Q29 25 32 27" stroke="#2c1810" stroke-width="1.1" fill="none"/>
      <path d="M38 27 Q41 25 44 27" stroke="#2c1810" stroke-width="1.1" fill="none"/>
      <path d="M28 38 Q35 41 42 38" stroke="${skin}" stroke-width="2" fill="none"/>
    </svg>`;
  }
}

function renderAgents(agentsList) {
  const row = document.getElementById('agentsRow');
  row.innerHTML = '';
  agentsList.forEach(agent => {
    const card = document.createElement('div');
    card.className = 'agent-card';
    card.id = 'agent-' + agent.id;
    card.style.setProperty('--agent-color', agent.color);
    card.innerHTML = `
      <div class="avatar-3d">
        <div class="avatar-face">${makeSVGAvatar(agent.avatar, agent.color, agent.bg)}</div>
      </div>
      <div class="agent-name">${agent.name.split(' ')[0]}</div>
      <div class="agent-role">${agent.role}</div>
      <div class="speaking-indicator">
        <div class="speaking-dot" style="background:${agent.color}"></div>
        <div class="speaking-dot" style="background:${agent.color}"></div>
        <div class="speaking-dot" style="background:${agent.color}"></div>
      </div>
      <div class="vote-bar-agent"><div class="vote-fill" id="vf-${agent.id}" style="background:${agent.color}"></div></div>
    `;
    card.onclick = () => askAgent(agent.id);
    row.appendChild(card);

    currentTokens[agent.id] = '';
  });
}

function renderVotes(votes) {
  const total = Object.values(votes).reduce((a,b)=>a+b,0)||1;
  const display = document.getElementById('votesDisplay');
  display.innerHTML = '';
  agents.forEach(agent => {
    const count = votes[agent.id] || 0;
    const pct = Math.round((count/total)*100);
    display.innerHTML += `<div class="vote-row">
      <div class="vote-name" style="color:${agent.color}">${agent.name.split(' ')[0]}</div>
      <div class="vote-track"><div class="vote-fill-bar" style="width:${pct}%;background:${agent.color}"></div></div>
      <div class="vote-count">${count}</div>
    </div>`;
    const vf = document.getElementById('vf-'+agent.id);
    if (vf) vf.style.width = pct + '%';
  });
}

function addMessage(msg, isTyping=false) {
  const agent = agents.find(a=>a.id===msg.agentId);
  if (!agent) return;
  const stream = document.getElementById('debateStream');
  const el = document.createElement('div');
  el.className = 'message';
  el.id = 'msg-' + msg.agentId + '-' + (msg.timestamp||Date.now());
  el.innerHTML = `
    <div class="msg-avatar-sm" style="background:${agent.bg};color:${agent.color}">${agent.name.split(' ').map(w=>w[0]).join('')}</div>
    <div class="msg-content">
      <div class="msg-meta">
        <span class="msg-name" style="color:${agent.color}">${agent.name}</span>
        <span class="msg-role-tag">${agent.role}</span>
        ${msg.isAudience ? '<span class="audience-tag">Pyetje audiencë</span>' : ''}
      </div>
      <div class="${isTyping?'msg-typing':'msg-text'}" id="text-${msg.agentId}">${isTyping?'Duke folur...':msg.text}</div>
    </div>`;
  stream.appendChild(el);
  stream.scrollTop = stream.scrollHeight;
  return el;
}

socket.on('init', data => {
  agents = data.agents;
  renderAgents(agents);
  if (data.state.messages.length) {
    data.state.messages.forEach(m => addMessage(m));
  }
  loadQR();
});

socket.on('topicSet', ({topic}) => {
  document.getElementById('topicInput').value = topic;
  document.getElementById('debateStream').innerHTML = '';
  document.getElementById('roundIndicator').textContent = 'Rundi 1 — Debat i hapur';
});

socket.on('roundStart', ({round}) => {
  document.getElementById('nextBtn').disabled = true;
  document.getElementById('roundIndicator').textContent = `Rundi ${round} — Debat aktiv`;
  showRoundBadge(`Rundi ${round}`);
});

socket.on('roundEnd', () => {
  document.getElementById('nextBtn').disabled = false;
  document.getElementById('roundIndicator').textContent = 'Rundi i mbaroi — Fillo raundin tjetër';
});

socket.on('speaking', ({agentId, start}) => {
  const card = document.getElementById('agent-'+agentId);
  if (!card) return;
  if (start) {
    card.classList.add('speaking');
    currentTokens[agentId] = '';
    const tempMsg = { agentId, timestamp: Date.now() };
    const el = addMessage(tempMsg, true);
    el.id = 'live-'+agentId;
  } else {
    card.classList.remove('speaking');
  }
});

socket.on('token', ({agentId, token}) => {
  currentTokens[agentId] = (currentTokens[agentId]||'') + token;
  const textEl = document.getElementById('text-'+agentId);
  if (textEl) {
    textEl.className = 'msg-text';
    textEl.textContent = currentTokens[agentId];
    const stream = document.getElementById('debateStream');
    stream.scrollTop = stream.scrollHeight;
  }
});

socket.on('audienceQuestion', ({question, targetAgent}) => {
  const el = document.createElement('div');
  el.className = 'audience-msg';
  el.innerHTML = `"${question}"<div class="audience-msg-meta">Pyetje për ${targetAgent||'parlamentin'}</div>`;
  document.getElementById('audienceMessages').prepend(el);
});

socket.on('voteUpdate', votes => renderVotes(votes));

function startDebate() {
  const topic = document.getElementById('topicInput').value.trim();
  if (!topic) return;
  document.getElementById('startBtn').disabled = true;
  socket.emit('setTopic', {topic});
  setTimeout(()=>document.getElementById('startBtn').disabled=false, 5000);
}

function nextRound() {
  document.getElementById('nextBtn').disabled = true;
  socket.emit('nextRound');
}

function askAgent(agentId) {
  const q = prompt('Pyetja jote për ' + (agents.find(a=>a.id===agentId)?.name||agentId) + ':');
  if (q) socket.emit('audienceQuestion', {question: q, targetAgent: agentId});
}

function showRoundBadge(text) {
  const old = document.querySelector('.round-badge');
  if (old) old.remove();
  const badge = document.createElement('div');
  badge.className = 'round-badge';
  badge.textContent = text;
  document.body.appendChild(badge);
  setTimeout(()=>badge.remove(), 3000);
}

async function loadQR() {
  try {
    const r = await fetch('/qr');
    const d = await r.json();
    document.getElementById('qrImg').src = d.qr;
    document.getElementById('qrUrl').textContent = d.url;
  } catch(e) {}
}

document.getElementById('topicInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') startDebate();
});
</script>
</body>
</html>
